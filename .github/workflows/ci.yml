name: Node.js CI
on:
  push:
    branches: [ "main" ]
    tags:
    - 'v*'
  pull_request:
    branches: [ "main" ]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false
    - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1.316.0
      with:
        ruby-version: '4.0.1'
        bundler-cache: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '25.x'
        package-manager-cache: false
        scope: '@appthreat'
    - name: Setup bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
    - name: build
      run: |
        npm ci
        npm test
        bash build.sh
        sudo npm install -g .
        astgen --version
        phpastgen --help
        rbastgen --help
        npm publish --dry-run
    - name: bun compatibility
      run: |
        bun --version
        bun astgen.js --version
        bun test-fixtures/astgen-shape-snapshot.js
        bun test-fixtures/astgen-type-regression.js
        bun test-fixtures/astgen-json-regression.js
        bun test-fixtures/astgen-vue-regression.js
    - name: publish
      run: |
        npm publish --provenance --access=public
      if: startsWith(github.ref, 'refs/tags/')
